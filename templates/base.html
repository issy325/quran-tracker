<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Spend Tracker{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark navbar-app">
    <div class="container-lg">
      <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-wallet2 me-2"></i>Spend Tracker
      </a>
      <div class="d-flex gap-4">
        <a class="nav-link-app {% if active_page == 'dashboard' %}active{% endif %}" href="/">
          <i class="bi bi-speedometer2 me-1"></i>Dashboard
        </a>
        <a class="nav-link-app {% if active_page == 'transactions' %}active{% endif %}" href="/transactions">
          <i class="bi bi-list-ul me-1"></i>All Transactions
        </a>
      </div>
    </div>
  </nav>

  <!-- Page content -->
  <div class="container-lg py-4">
    {% block content %}{% endblock %}
  </div>

  <!-- Save toast -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="appToast" class="toast align-items-center border-0 text-white" role="alert">
      <div class="d-flex">
        <div class="toast-body fw-semibold" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script>
    function showToast(msg, type = 'success') {
      const el = document.getElementById('appToast');
      el.className = `toast align-items-center border-0 text-white bg-${type}`;
      document.getElementById('toastMsg').textContent = msg;
      bootstrap.Toast.getOrCreateInstance(el, { delay: 2500 }).show();
    }

    async function saveRow(id, category, description) {
      const r = await fetch(`/api/update/${id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category, description }),
      });
      if (r.ok) showToast('✓  Saved');
      else       showToast('Error saving', 'danger');
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
